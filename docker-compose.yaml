version: "3.9"

services:
  # Redis: caching layer, distributed queue, pub/sub for worker coordination
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Postgres: structured storage for crawl results, job metadata, URL history
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scrapegoat
      POSTGRES_PASSWORD: scrapegoat
      POSTGRES_DB: scrapegoat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
