version: "3.8"

services:
  master:
    build: .
    container_name: scrapegoat-master
    command: ["master", "--addr", ":8081"]
    ports:
      - "8081:8081"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - scrapegoat

  worker:
    build: .
    command: ["worker", "--master", "http://master:8081", "--capacity", "10"]
    deploy:
      replicas: 3
    depends_on:
      - master
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - scrapegoat

  dashboard:
    build: .
    container_name: scrapegoat-dashboard
    command: ["dashboard", "--addr", ":8080"]
    ports:
      - "8080:8080"
    networks:
      - scrapegoat

  redis:
    image: redis:7-alpine
    container_name: scrapegoat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - scrapegoat

  prometheus:
    image: prom/prometheus:latest
    container_name: scrapegoat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - scrapegoat

networks:
  scrapegoat:
    driver: bridge

volumes:
  redis_data:
